<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMDb Lamoniê PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amarelo: #f5c518; --preto: #000; --cinza: #1a1a1a; }
        body { 
            background: var(--preto); 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 150px 15px 20px;
            -webkit-tap-highlight-color: transparent;
        }
        
        header { 
            background: #121212; 
            padding: 15px; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; 
            z-index: 1000; 
            box-sizing: border-box; 
            border-bottom: 1px solid #333; 
        }
        .logo { background: var(--amarelo); color: #000; font-weight: 900; padding: 5px 10px; border-radius: 4px; display: inline-block; font-size: 22px; margin-bottom: 10px; }
        
        .busca-container { 
            display: flex; 
            background: #fff; 
            border-radius: 4px; 
            padding: 8px 12px; 
            align-items: center; 
        }
        .busca-container input { 
            border: none; 
            flex: 1; 
            outline: none; 
            font-size: 16px; 
            color: #000; 
            background: transparent;
        }

        h2 { border-left: 4px solid var(--amarelo); padding-left: 10px; font-size: 1.1rem; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--cinza); border-radius: 8px; overflow: hidden; border: 1px solid #333; position: relative; }
        .card img { width: 100%; height: 250px; object-fit: cover; display: block; background: #222; }
        .info { padding: 10px; }
        .nota { color: var(--amarelo); font-weight: bold; font-size: 13px; margin-bottom: 4px; }
        .titulo-filme { font-size: 14px; font-weight: 500; height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Modal */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-y: auto; 
        }
        .fechar-modal { font-size: 40px; color: var(--amarelo); position: absolute; right: 20px; top: 10px; z-index: 10001; }
        #m-img { width: 100%; border-radius: 10px; margin-top: 30px; }
        .btn-trailer { 
            display: block; 
            background: #f00; 
            color: #fff; 
            text-align: center; 
            padding: 15px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            margin-top: 20px; 
        }

        #status { text-align: center; padding: 20px; color: var(--amarelo); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">IMDb</div>
    <div class="busca-container">
        <i class="fas fa-search" style="color:#666; margin-right: 10px;"></i>
        <input type="text" id="campo" placeholder="Pesquisar filmes...">
    </div>
</header>

<div id="status">A carregar lançamentos...</div>
<h2 id="secao-titulo">Lançamentos no Cinema</h2>
<div class="grid" id="grid"></div>

<div id="modal" class="modal">
    <span class="fechar-modal" onclick="fecharModal()">&times;</span>
    <img id="m-img" src="">
    <h1 id="m-tit" style="color: var(--amarelo); margin: 15px 0 10px;"></h1>
    <div id="m-nota" style="font-weight: bold; margin-bottom: 15px;"></div>
    <p id="m-sin" style="line-height: 1.6; color: #ccc; font-size: 16px;"></p>
    <a id="m-yt" target="_blank" class="btn-trailer">VER TRAILER NO YOUTUBE</a>
</div>

<script>
    const API_KEY = '9b8344e5482386e680cf38a8e3d30906';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';

    // Função Principal para carregar dados
    async function apiRequest(endpoint, query = '') {
        const url = `https://api.themoviedb.org/3/${endpoint}?api_key=${API_KEY}&language=pt-BR${query}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Erro na rede');
            const data = await response.json();
            document.getElementById('status').style.display = 'none';
            return data.results;
        } catch (error) {
            document.getElementById('status').innerText = "Erro ao conectar. Verifique a sua internet.";
            console.error(error);
            return [];
        }
    }

    async function carregarLancamentos() {
        const filmes = await apiRequest('movie/now_playing');
        exibirFilmes(filmes);
    }

    function exibirFilmes(filmes) {
        const grid = document.getElementById('grid');
        grid.innerHTML = filmes.map(f => `
            <div class="card" onclick="verDetalhes(${f.id})">
                <img src="${f.poster_path ? IMG_URL + f.poster_path : 'https://via.placeholder.com/500x750?text=Sem+Imagem'}">
                <div class="info">
                    <div class="nota">⭐ ${f.vote_average.toFixed(1)}</div>
                    <div class="titulo-filme">${f.title}</div>
                </div>
            </div>
        `).join('');
    }

    async function verDetalhes(id) {
        const url = `https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=pt-BR`;
        const resp = await fetch(url);
        const f = await resp.json();

        document.getElementById('m-img').src = IMG_URL + f.poster_path;
        document.getElementById('m-tit').innerText = f.title;
        document.getElementById('m-nota').innerText = `Avaliação IMDb: ⭐ ${f.vote_average.toFixed(1)}`;
        document.getElementById('m-sin').innerText = f.overview || "Sinopse não disponível em português.";
        document.getElementById('m-yt').href = `https://www.youtube.com/results?search_query=trailer+oficial+${encodeURIComponent(f.title)}`;
        
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function fecharModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Busca ao digitar
    let tempoEspera;
    document.getElementById('campo').addEventListener('input', (e) => {
        clearTimeout(tempoEspera);
        const busca = e.target.value;
        tempoEspera = setTimeout(async () => {
            if (busca.length > 2) {
                document.getElementById('secao-titulo').innerText = "Resultados da Pesquisa";
                const resultados = await apiRequest('search/movie', `&query=${encodeURIComponent(busca)}`);
                exibirFilmes(resultados);
            } else if (busca.length === 0) {
                document.getElementById('secao-titulo').innerText = "Lançamentos no Cinema";
                carregarLancamentos();
            }
        }, 500);
    });

    // Iniciar site
    window.onload = carregarLancamentos;
</script>

</body>
</html>
