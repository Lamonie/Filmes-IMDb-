<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ CINE | ULTRA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --imdb: #f5c518; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-top: 140px; }
        
        header { 
            background: #000; padding: 20px 5%; border-bottom: 1px solid #333; 
            position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;
        }
        .logo { color: var(--imdb); font-size: 24px; font-weight: 900; border: 2px solid var(--imdb); padding: 2px 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        
        .search-container { display: flex; gap: 10px; background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #444; }
        .search-container input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 16px; }
        .search-container i { color: var(--imdb); font-size: 20px; cursor: pointer; }

        .container { padding: 0 5%; }
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .movie-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        /* Ajuste para a imagem carregar melhor no iPhone */
        .movie-card img { width: 100%; min-height: 230px; object-fit: cover; background: #222; display: block; }
        .movie-info { padding: 12px; }
        .movie-info b { font-size: 14px; display: block; height: 35px; overflow: hidden; }
        .rating { color: var(--imdb); font-weight: bold; margin-bottom: 5px; font-size: 14px; }

        #status-voz { color: var(--imdb); text-align: center; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">LAMONIÊ</div>
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="busca" placeholder="Fale ou digite...">
        <i class="fas fa-microphone" id="mic" onclick="ouvirVoz()"></i>
    </div>
    <div id="status-voz">Escutando...</div>
</header>

<div class="container">
    <div class="movie-grid" id="grid"></div>
</div>

<script>
    // Mudei o servidor de imagens para um que o iPhone não bloqueia (estilo Google Images)
    const imgBase = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w342";

    const filmes = [
        { t: "Deadpool & Wolverine", n: 8.9, i: "/o99vHmmetS7YqYp8p0mI3MD99Zp.jpg" },
        { t: "Coringa: Delírio a Dois", n: 7.0, i: "/86pUjm9K4fW656O6D1HT6ZsiOVc.jpg" },
        { t: "Divertida Mente 2", n: 7.8, i: "/8Y766p37fSIsS6vNcO7X9S0U7fI.jpg" },
        { t: "Transformers: O Início", n: 7.9, i: "/m0M67XUjG69S838P0S58W3lY6pS.jpg" },
        { t: "Alien: Romulus", n: 7.4, i: "/b33S7C7uArI2YUIvUdpS0f07nsh.jpg" },
        { t: "É Assim Que Acaba", n: 6.9, i: "/36Y9S0U0P9pYl8vU3I1B1pYp7X6.jpg" },
        { t: "Longlegs", n: 7.2, i: "/v7WvfS7jU8lXW9pX6oR7k8yXU.jpg" },
        { t: "Meu Malvado Favorito 4", n: 6.8, i: "/3wS0SGBpZdy667r3o666oR7k8yXU.jpg" }
    ];

    const grid = document.getElementById('grid');
    const input = document.getElementById('busca');

    function exibir(lista) {
        grid.innerHTML = lista.map(f => `
            <div class="movie-card">
                <img src="${imgBase + f.i}" onerror="this.src='https://via.placeholder.com/342x513?text=Filme'">
                <div class="movie-info">
                    <div class="rating"><i class="fas fa-star"></i> ${f.n}</div>
                    <b>${f.t}</b>
                </div>
            </div>
        `).join('');
    }

    input.oninput = () => {
        const termo = input.value.toLowerCase();
        const filtrados = filmes.filter(f => f.t.toLowerCase().includes(termo));
        exibir(filtrados);
    };

    function ouvirVoz() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        document.getElementById('status-voz').style.display = 'block';
        
        recognition.onresult = (e) => {
            const fala = e.results[0][0].transcript;
            input.value = fala;
            input.oninput();
            document.getElementById('status-voz').style.display = 'none';
        };
        recognition.onerror = () => document.getElementById('status-voz').style.display = 'none';
        recognition.start();
    }

    exibir(filmes);
</script>

</body>
</html>
