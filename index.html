<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMDb Lamoniê PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amarelo: #f5c518; --preto: #000000; --cinza: #121212; }
        body { background: var(--preto); color: white; font-family: sans-serif; margin: 0; padding-top: 130px; }
        
        header { background: var(--cinza); padding: 15px; border-bottom: 1px solid #333; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { background: var(--amarelo); color: black; font-weight: 900; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px; font-size: 20px; }
        
        .busca-box { display: flex; background: white; border-radius: 4px; padding: 8px; align-items: center; }
        .busca-box input { border: none; flex: 1; outline: none; font-size: 16px; color: black; padding-left: 10px; }
        .busca-box i { color: #555; font-size: 18px; }

        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 250px; object-fit: cover; background: #222; }
        .paddi { padding: 10px; }
        .nota { color: var(--amarelo); font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .tit { font-size: 14px; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .m-content { padding: 20px; max-width: 500px; margin: auto; }
        .m-img { width: 100%; border-radius: 10px; }
        .fechar { color: var(--amarelo); font-size: 30px; float: right; cursor: pointer; }
        .btn-tr { display: block; background: var(--amarelo); color: black; text-align: center; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">IMDb</div>
    <div class="busca-box">
        <i class="fas fa-search"></i>
        <input type="text" id="inputBusca" placeholder="Pesquisar filme...">
        <i class="fas fa-microphone" onclick="vocal()"></i>
    </div>
</header>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<div id="modal" class="modal">
    <div class="m-content">
        <span class="fechar" onclick="fechar()">&times;</span>
        <img id="m-foto" class="m-img">
        <h2 id="m-tit" style="color:var(--amarelo)"></h2>
        <p id="m-sin" style="line-height:1.5"></p>
        <a id="m-link" target="_blank" class="btn-tr">VER TRAILER NO YOUTUBE</a>
    </div>
</div>

<script>
    const chave = '9b8344e5482386e680cf38a8e3d30906';
    const proxy = "https://images.weserv.nl/?url=";

    async function carregar(nome = '') {
        let api = `https://api.themoviedb.org/3/movie/popular?api_key=${chave}&language=pt-BR`;
        if(nome) api = `https://api.themoviedb.org/3/search/movie?api_key=${chave}&language=pt-BR&query=${encodeURIComponent(nome)}`;
        
        try {
            const r = await fetch(api);
            const d = await r.json();
            const grid = document.getElementById('grid');
            grid.innerHTML = d.results.map(f => `
                <div class="card" onclick="detalhes(${f.id})">
                    <img src="${proxy}https://image.tmdb.org/t/p/w342${f.poster_path}" onerror="this.src='https://via.placeholder.com/342x513?text=IMDb'">
                    <div class="paddi">
                        <div class="nota">⭐ ${f.vote_average.toFixed(1)}</div>
                        <div class="tit">${f.title}</div>
                    </div>
                </div>
            `).join('');
        } catch (e) { console.log("Erro de rede"); }
    }

    async function detalhes(id) {
        const r = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${chave}&language=pt-BR`);
        const f = await r.json();
        document.getElementById('m-foto').src = proxy + 'https://image.tmdb.org/t/p/w500' + f.poster_path;
        document.getElementById('m-tit').innerText = f.title;
        document.getElementById('m-sin').innerText = f.overview || "Sem descrição disponível.";
        document.getElementById('m-link').href = `https://www.youtube.com/results?search_query=trailer+${encodeURIComponent(f.title)}`;
        document.getElementById('modal').style.display = 'block';
    }

    function fechar() { document.getElementById('modal').style.display = 'none'; }

    let t;
    document.getElementById('inputBusca').oninput = (e) => {
        clearTimeout(t);
        t = setTimeout(() => carregar(e.target.value), 500);
    };

    function vocal() {
        const Rec = window.webkitSpeechRecognition;
        if(!Rec) return;
        const v = new Rec();
        v.lang = 'pt-BR';
        v.onresult = (e) => {
            const txt = e.results[0][0].transcript;
            document.getElementById('inputBusca').value = txt;
            carregar(txt);
        };
        v.start();
    }

    carregar();
</script>
</body>
</html>
