<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamoniê Cine | IMDb</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --imdb: #f5c518; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; }
        header { background: #000; padding: 15px 5%; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .logo { color: var(--imdb); font-size: 22px; font-weight: 900; border: 2px solid var(--imdb); padding: 2px 8px; border-radius: 4px; }
        
        /* Banner */
        .hero { height: 40vh; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; padding: 30px 5%; background-color: #222; }
        .hero::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, var(--bg), transparent); }
        .hero-content { z-index: 2; }
        
        /* Grid */
        .container { padding: 20px 5%; }
        .section-title { border-left: 4px solid var(--imdb); padding-left: 10px; margin-bottom: 20px; font-size: 20px; }
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .movie-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        .movie-card img { width: 100%; height: auto; display: block; background: #333; }
        .movie-info { padding: 10px; }
        .movie-info b { font-size: 14px; display: block; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rating { color: var(--imdb); font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        /* Mensagem de Erro */
        #error-msg { color: #ff4444; text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">LAMONIÊ</div>
    <span style="font-size: 12px; color: #888;">IMDb Rating</span>
</header>

<div class="hero" id="hero">
    <div class="hero-content">
        <div class="rating" id="hero-rating"></div>
        <h2 id="hero-title" style="margin: 5px 0 0;">Carregando...</h2>
    </div>
</div>

<div class="container">
    <h3 class="section-title">Populares no IMDb</h3>
    <div id="error-msg">Ops! Não foi possível carregar os filmes.</div>
    <div class="movie-grid" id="grid"></div>
</div>

<script>
    // Usei uma chave nova e mudei a forma de carregar
    const key = '9b8344e5482386e680cf38a8e3d30906';
    const grid = document.getElementById('grid');
    const errorMsg = document.getElementById('error-msg');

    async function loadMovies() {
        try {
            const response = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${key}&language=pt-BR`);
            
            if (!response.ok) throw new Error('Falha na rede');
            
            const data = await response.json();
            const movies = data.results;

            if (movies && movies.length > 0) {
                // Banner
                const top = movies[0];
                document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/w780${top.backdrop_path})`;
                document.getElementById('hero-title').innerText = top.title;
                document.getElementById('hero-rating').innerHTML = `<i class="fas fa-star"></i> ${top.vote_average.toFixed(1)}`;

                // Lista
                grid.innerHTML = movies.map(m => `
                    <div class="movie-card">
                        <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" alt="${m.title}">
                        <div class="movie-info">
                            <div class="rating"><i class="fas fa-star"></i> ${m.vote_average.toFixed(1)}</div>
                            <b>${m.title}</b>
                        </div>
                    </div>
                `).join('');
            }
        } catch (err) {
            console.error(err);
            errorMsg.style.display = 'block';
            document.getElementById('hero-title').innerText = "Erro ao carregar";
        }
    }

    // Executa a função
    loadMovies();
</script>

</body>
</html>
