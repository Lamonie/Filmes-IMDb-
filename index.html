<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lamoniê Cine PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --imdb: #f5c518; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-top: 130px; }
        
        /* Header e Busca */
        header { 
            background: #000; padding: 15px 5%; border-bottom: 1px solid #333; 
            position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;
        }
        .logo { color: var(--imdb); font-size: 20px; font-weight: 900; border: 2px solid var(--imdb); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        
        .search-box { display: flex; gap: 10px; background: #222; padding: 10px; border-radius: 8px; align-items: center; border: 1px solid #444; }
        .search-box input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 16px; }
        .search-box i { color: var(--imdb); cursor: pointer; font-size: 18px; }

        /* Grid */
        .container { padding: 0 5%; }
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .movie-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; }
        .movie-info { padding: 10px; }
        .movie-info b { font-size: 14px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rating { color: var(--imdb); font-weight: bold; font-size: 14px; margin-bottom: 5px; }

        #status-voz { font-size: 12px; color: var(--imdb); text-align: center; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">LAMONIÊ</div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="campo-busca" placeholder="Buscar filme...">
        <i class="fas fa-microphone" id="btn-voz" onclick="ouvirVoz()"></i>
    </div>
    <div id="status-voz">Ouvindo...</div>
</header>

<div class="container">
    <div class="movie-grid" id="grid">
        <!-- O JS vai carregar tudo aqui -->
    </div>
</div>

<script>
    const key = '9b8344e5482386e680cf38a8e3d30906';
    const grid = document.getElementById('grid');
    const campoBusca = document.getElementById('campo-busca');

    // MÁGICA: Proxy para evitar bloqueio de imagem no iPhone
    const proxy = "https://images.weserv.nl/?url=";

    async function buscarFilmes(query = '') {
        let url = `${BASE_URL}/movie/popular?api_key=${key}&language=pt-BR`;
        if(query) url = `${BASE_URL}/search/movie?api_key=${key}&language=pt-BR&query=${encodeURIComponent(query)}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            renderizar(data.results);
        } catch (e) { console.log("Erro de conexão"); }
    }

    const BASE_URL = 'https://api.themoviedb.org/3';

    function renderizar(filmes) {
        grid.innerHTML = filmes.map(m => {
            // Se não tiver imagem, usa um placeholder
            const imgPath = m.poster_path ? `${proxy}https://image.tmdb.org/t/p/w342${m.poster_path}` : 'https://via.placeholder.com/342x513?text=Sem+Capa';
            return `
                <div class="movie-card">
                    <img src="${imgPath}" loading="lazy">
                    <div class="movie-info">
                        <div class="rating"><i class="fas fa-star"></i> ${m.vote_average.toFixed(1)}</div>
                        <b>${m.title}</b>
                    </div>
                </div>
            `;
        }).join('');
    }

    // BUSCA POR TEXTO
    campoBusca.oninput = () => buscarFilmes(campoBusca.value);

    // BUSCA POR VOZ (Microfone)
    function ouvirVoz() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        document.getElementById('status-voz').style.display = 'block';

        recognition.onresult = (event) => {
            const voz = event.results[0][0].transcript;
            campoBusca.value = voz;
            buscarFilmes(voz);
            document.getElementById('status-voz').style.display = 'none';
        };

        recognition.onerror = () => { document.getElementById('status-voz').style.display = 'none'; };
        recognition.start();
    }

    // Iniciar
    buscarFilmes();
</script>

</body>
</html>
