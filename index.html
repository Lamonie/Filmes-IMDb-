<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMDb Lamoniê PRO</title>
    <style>
        :root { --amarelo: #f5c518; --preto: #000; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 140px 15px 20px; }
        
        header { background: #121212; padding: 15px; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #333; box-sizing: border-box; }
        .logo { background: var(--amarelo); color: #000; font-weight: 900; padding: 5px 10px; border-radius: 4px; display: inline-block; font-size: 20px; margin-bottom: 10px; }
        
        .busca-box { background: #fff; border-radius: 4px; padding: 10px; display: flex; }
        .busca-box input { border: none; width: 100%; outline: none; font-size: 16px; color: #000; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 230px; object-fit: cover; display: block; }
        .p-10 { padding: 10px; }
        .nota { color: var(--amarelo); font-weight: bold; font-size: 14px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .close { color: var(--amarelo); font-size: 40px; position: fixed; right: 20px; top: 10px; font-weight: bold; }
        #m-yt { display: block; background: #f00; color: #fff; text-align: center; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">IMDb LAMONIÊ</div>
    <div class="busca-box">
        <input type="text" id="campo" placeholder="Toque aqui para pesquisar..." oninput="buscar(this.value)">
    </div>
</header>

<h2 id="tit" style="border-left: 4px solid var(--amarelo); padding-left: 10px;">Lançamentos no Cinema</h2>
<div class="grid" id="grid">Carregando catálogo...</div>

<div id="modal" class="modal">
    <span class="close" onclick="fechar()">&times;</span>
    <img id="m-img" style="width: 100%; border-radius: 10px; margin-top: 30px;">
    <h1 id="m-tit" style="color: var(--amarelo);"></h1>
    <p id="m-nota" style="font-weight: bold;"></p>
    <p id="m-sin" style="line-height: 1.5; color: #ccc;"></p>
    <a id="m-yt" target="_blank">VER TRAILER OFICIAL</a>
</div>

<script>
    const KEY = '9b8344e5482386e680cf38a8e3d30906';

    // Versão ultra compatível com Safari/iOS
    async function carregar(url) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            desenhar(data.results);
        } catch (e) {
            document.getElementById('grid').innerHTML = "O Safari ainda está bloqueando. Tente abrir em aba anônima ou usar o Google Chrome no iPhone.";
        }
    }

    function desenhar(filmes) {
        const container = document.getElementById('grid');
        container.innerHTML = '';
        filmes.forEach(f => {
            if(!f.poster_path) return;
            const item = document.createElement('div');
            item.className = 'card';
            item.onclick = () => ver(f.id);
            item.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w342${f.poster_path}">
                <div class="p-10">
                    <div class="nota">⭐ ${f.vote_average}</div>
                    <div style="font-size:14px; margin-top:5px;">${f.title}</div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function buscar(valor) {
        if(valor.length > 2) {
            document.getElementById('tit').innerText = "Resultados:";
            carregar(`https://api.themoviedb.org/3/search/movie?api_key=${KEY}&language=pt-BR&query=${encodeURIComponent(valor)}`);
        } else if (valor.length == 0) {
            document.getElementById('tit').innerText = "Lançamentos no Cinema";
            carregar(`https://api.themoviedb.org/3/movie/now_playing?api_key=${KEY}&language=pt-BR`);
        }
    }

    async function ver(id) {
        const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${KEY}&language=pt-BR`);
        const f = await res.json();
        document.getElementById('m-img').src = 'https://image.tmdb.org/t/p/w500' + f.poster_path;
        document.getElementById('m-tit').innerText = f.title;
        document.getElementById('m-nota').innerText = "Avaliação: ⭐ " + f.vote_average;
        document.getElementById('m-sin').innerText = f.overview || "Sem sinopse disponível.";
        document.getElementById('m-yt').href = "https://www.youtube.com/results?search_query=trailer+" + encodeURIComponent(f.title);
        document.getElementById('modal').style.display = 'block';
    }

    function fechar() { document.getElementById('modal').style.display = 'none'; }

    // Início automático
    carregar(`https://api.themoviedb.org/3/movie/now_playing?api_key=${KEY}&language=pt-BR`);
</script>
</body>
</html>
