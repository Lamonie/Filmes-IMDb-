<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamoniê Cine | VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --imdb: #f5c518; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; }
        header { background: #000; padding: 15px 5%; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .logo { color: var(--imdb); font-size: 22px; font-weight: 900; border: 2px solid var(--imdb); padding: 2px 8px; border-radius: 4px; }
        
        .hero { height: 35vh; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; padding: 30px 5%; background-image: url('https://image.tmdb.org/t/p/w780/o99vHmmetS7YqYp8p0mI3MD99Zp.jpg'); }
        .hero::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, var(--bg), transparent); }
        .hero-content { z-index: 2; }
        
        .container { padding: 20px 5%; }
        .section-title { border-left: 4px solid var(--imdb); padding-left: 10px; margin-bottom: 20px; font-size: 20px; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .movie-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .movie-card img { width: 100%; height: auto; display: block; }
        .movie-info { padding: 10px; }
        .movie-info b { font-size: 14px; display: block; margin-bottom: 5px; }
        .rating { color: var(--imdb); font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo">LAMONIÊ</div>
    <span style="font-size: 12px; color: #888;">Catálogo Manual</span>
</header>

<div class="hero">
    <div class="hero-content">
        <div class="rating"><i class="fas fa-star"></i> 8.9</div>
        <h2 style="margin: 5px 0 0;">Deadpool & Wolverine</h2>
    </div>
</div>

<div class="container">
    <h3 class="section-title">Populares no IMDb</h3>
    <div class="movie-grid" id="grid">
        <!-- AQUI VOCÊ SÓ PRECISA COPIAR E COLAR ESSES BLOCOS ABAIXO -->
        
        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w342/86pUjm9K4fW656O6D1HT6ZsiOVc.jpg">
            <div class="movie-info">
                <div class="rating"><i class="fas fa-star"></i> 7.0</div>
                <b>Coringa: Delírio a Dois</b>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w342/8Y766p37fSIsS6vNcO7X9S0U7fI.jpg">
            <div class="movie-info">
                <div class="rating"><i class="fas fa-star"></i> 7.8</div>
                <b>Divertida Mente 2</b>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w342/m0M67XUjG69S838P0S58W3lY6pS.jpg">
            <div class="movie-info">
                <div class="rating"><i class="fas fa-star"></i> 6.8</div>
                <b>Transformers: O Início</b>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w342/7Y7p9b6O8G3yYp7X6oR7k8yXU.jpg">
            <div class="movie-info">
                <div class="rating"><i class="fas fa-star"></i> 8.1</div>
                <b>O Dublê</b>
            </div>
        </div>

    </div>
</div>

</body>
</html>
