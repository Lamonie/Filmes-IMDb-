<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMONIÊ CINE | OFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --imdb: #f5c518; --bg: #0a0a0a; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-top: 150px; }
        
        header { 
            background: #000; padding: 20px 5%; border-bottom: 1px solid #333; 
            position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;
        }
        .logo { color: var(--imdb); font-size: 24px; font-weight: 900; border: 2px solid var(--imdb); padding: 2px 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        
        .search-container { display: flex; gap: 10px; background: #222; padding: 12px; border-radius: 12px; border: 1px solid #444; }
        .search-container input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 16px; }
        .search-container i { color: var(--imdb); font-size: 20px; }

        .container { padding: 0 5%; }
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .movie-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        /* Forçando a exibição da imagem */
        .movie-card img { width: 100%; height: 250px; object-fit: cover; display: block; background: #222; }
        .movie-info { padding: 12px; }
        .movie-info b { font-size: 14px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rating { color: var(--imdb); font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        
        #status-voz { color: var(--imdb); text-align: center; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">LAMONIÊ</div>
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="busca" placeholder="Fale ou digite um filme...">
        <i class="fas fa-microphone" id="mic" onclick="ouvirVoz()"></i>
    </div>
    <div id="status-voz">Escutando...</div>
</header>

<div class="container">
    <div class="movie-grid" id="grid">
        <!-- O catálogo vai aparecer aqui -->
    </div>
</div>

<script>
    // LISTA DE FILMES COM LINKS DE IMAGENS QUE O IPHONE NÃO BLOQUEIA
    const filmes = [
        { t: "Coringa: Delírio a Dois", n: "7.0", i: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=500&auto=format&fit=crop" },
        { t: "Batman: O Cavaleiro", n: "9.0", i: "https://images.unsplash.com/photo-1531259683007-016a7b628fc3?q=80&w=500&auto=format&fit=crop" },
        { t: "Interestelar", n: "8.7", i: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=500&auto=format&fit=crop" },
        { t: "Oppenheimer", n: "8.4", i: "https://images.unsplash.com/photo-1475113548554-5a36f1f523d6?q=80&w=500&auto=format&fit=crop" },
        { t: "Duna: Parte 2", n: "8.6", i: "https://images.unsplash.com/photo-1506466010722-395aa2bef877?q=80&w=500&auto=format&fit=crop" },
        { t: "Homem-Aranha", n: "8.2", i: "https://images.unsplash.com/photo-1635805737707-575885ab0820?q=80&w=500&auto=format&fit=crop" }
    ];

    const grid = document.getElementById('grid');
    const input = document.getElementById('busca');

    function exibir(lista) {
        if (lista.length === 0) {
            grid.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1/3;">Nenhum filme encontrado.</p>';
            return;
        }
        grid.innerHTML = lista.map(f => `
            <div class="movie-card">
                <img src="${f.i}" alt="${f.t}">
                <div class="movie-info">
                    <div class="rating"><i class="fas fa-star"></i> ${f.n}</div>
                    <b>${f.t}</b>
                </div>
            </div>
        `).join('');
    }

    // Busca em tempo real
    input.addEventListener('input', () => {
        const termo = input.value.toLowerCase();
        const filtrados = filmes.filter(f => f.t.toLowerCase().includes(termo));
        exibir(filtrados);
    });

    // Função de Microfone
    function ouvirVoz() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) {
            alert("Seu navegador não suporta busca por voz.");
            return;
        }
        const rec = new Speech();
        rec.lang = 'pt-BR';
        document.getElementById('status-voz').style.display = 'block';
        
        rec.onresult = (e) => {
            const fala = e.results[0][0].transcript;
            input.value = fala;
            input.dispatchEvent(new Event('input'));
            document.getElementById('status-voz').style.display = 'none';
        };
        rec.onerror = () => document.getElementById('status-voz').style.display = 'none';
        rec.start();
    }

    // Início
    exibir(filmes);
</script>

</body>
</html>
